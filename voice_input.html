<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>음성 입력</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 24px;
      background: #fafafa;
    }
    h2 {
      margin-bottom: 16px;
    }
    textarea {
      width: 100%;
      height: 180px;
      font-size: 18px;
      padding: 12px;
      box-sizing: border-box;
      border-radius: 12px;
      border: 1px solid #ccc;
    }
    button {
      width: 100%;
      padding: 16px;
      margin-top: 12px;
      font-size: 18px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
    }
    .start {
      background: #ff4b4b;
      color: white;
    }
    .send {
      background: #222;
      color: white;
    }
    .clear {
      background: #ddd;
      color: black;
    }
    .status {
      margin-top: 12px;
      font-size: 15px;
      color: #555;
    }
  </style>
</head>
<body>
  <h2>🎤 음성 입력</h2>

  <textarea id="result" placeholder="여기에 음성 인식 결과가 표시됩니다."></textarea>

  <button class="start" onclick="startRecognition()">🔴 말하기 시작</button>
  <button class="send" onclick="sendToMain()">✅ 메인 화면으로 보내기</button>
  <button class="clear" onclick="clearText()">🗑️ 지우기</button>

  <div class="status" id="status">대기 중</div>

  <script>
    const resultBox = document.getElementById("result");
    const statusBox = document.getElementById("status");

    const SpeechRecognition =
      window.SpeechRecognition || window.webkitSpeechRecognition;

    if (!SpeechRecognition) {
      statusBox.innerText = "이 브라우저는 음성 인식을 지원하지 않습니다. 모바일 Chrome을 사용해주세요.";
    }

    function startRecognition() {
      if (!SpeechRecognition) {
        alert("이 브라우저는 음성 인식을 지원하지 않습니다.");
        return;
      }

      const recognition = new SpeechRecognition();
      recognition.lang = "ko-KR";
      recognition.interimResults = true;
      recognition.continuous = false;

      let finalText = resultBox.value.trim();

      recognition.onstart = function () {
        statusBox.innerText = "듣는 중...";
      };

      recognition.onresult = function (event) {
        let interimText = "";

        for (let i = event.resultIndex; i < event.results.length; i++) {
          const transcript = event.results[i][0].transcript;

          if (event.results[i].isFinal) {
            finalText += (finalText ? " " : "") + transcript;
          } else {
            interimText += transcript;
          }
        }

        resultBox.value = finalText + (interimText ? " " + interimText : "");
      };

      recognition.onerror = function (event) {
        statusBox.innerText = "오류: " + event.error;
      };

      recognition.onend = function () {
        statusBox.innerText = "음성 입력 종료";
      };

      recognition.start();
    }

    function sendToMain() {
  const text = resultBox.value.trim();

  if (!text) {
    alert("보낼 텍스트가 없습니다.");
    return;
  }

  const MAIN_URL = "https://hexastichic-stefany-tardo.ngrok-free.dev";
  const url = new URL(MAIN_URL);
  url.searchParams.set("voice", text);

  window.location.href = url.toString();
}

    function clearText() {
      resultBox.value = "";
      statusBox.innerText = "초기화됨";
    }
  </script>
</body>
</html>
